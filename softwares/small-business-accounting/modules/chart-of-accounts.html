<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart of Accounts</title>
    <link rel="stylesheet" href="../dashboard.css">
</head>
<body>
    <nav class="sidebar">
        <h2>
            <svg class="atmilio-logo" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg" aria-labelledby="logoTitle" role="img">
                <title id="logoTitle">Atmilio Logo</title>
                <path d="M25 5L45 25L25 45L5 25L25 5Z" stroke="#4c51bf" stroke-width="2" stroke-linejoin="round" />
                <path d="M25 15L35 25L25 35L15 25L25 15Z" fill="#6b46c1" />
                <circle cx="25" cy="25" r="5" fill="#e9d5ff" />
            </svg>
            Atmilio Accounting
        </h2>
        <ul>
            <li><a href="../dashboard.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Dashboard</a></li>
            <li><a href="invoicing.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Invoicing</a></li>
            <li><a href="expenses.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Expenses</a></li>
            <li class="active"><a href="chart-of-accounts.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Chart of Accounts</a></li>
            <li><a href="journal-entries.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Journal Entries</a></li>
            <li><a href="general-ledger.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">General Ledger</a></li>
            <li><a href="reports.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Reports</a></li>
            <li><a href="banking.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Banking</a></li>
            <li><a href="#" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Payroll</a></li>
            <li><a href="users.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Settings</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header>
            <h1>Chart of Accounts</h1>
            <button class="btn-primary" onclick="document.getElementById('addAccountModal').style.display='block'">+ New Account</button>
        </header>
        <table class="crud-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Parent</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="accountsTableBody">
                <!-- Populated by JS -->
            </tbody>
        </table>
        <!-- Modal for adding account (not yet functional) -->
        <div id="addAccountModal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.2);z-index:100;align-items:center;justify-content:center;">
            <form style="background:#fff;padding:2rem;border-radius:1rem;max-width:400px;margin:5vh auto;" onsubmit="return false;">
                <h2>New Account</h2>
                <label>Name<br><input type="text" required></label><br>
                <label>Type<br>
                    <select>
                        <option>Asset</option>
                        <option>Liability</option>
                        <option>Equity</option>
                        <option>Revenue</option>
                        <option>Expense</option>
                    </select>
                </label><br>
                <button class="btn-primary" type="submit">Save</button>
                <button type="button" onclick="document.getElementById('addAccountModal').style.display='none'">Cancel</button>
            </form>
        </div>
    </main>
    <script src="accountingEngine.js"></script>
    <script>
      // Render accounts dynamically
      function renderAccounts() {
        const tbody = document.getElementById('accountsTableBody');
        tbody.innerHTML = '';
        window.accountingEngine.accounts.forEach(acc => {
          const parent = acc.parentId ? window.accountingEngine.accounts.find(a => a.id === acc.parentId)?.name : '';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${acc.name}</td>
            <td>${acc.type.charAt(0).toUpperCase() + acc.type.slice(1)}</td>
            <td>${parent || '-'}</td>
            <td><button disabled>Edit</button></td>
          `;
          tbody.appendChild(tr);
        });
      }
      renderAccounts();
    </script>
    <style>
        .status.active { color:#059669; font-weight:700; }
    </style>
</body>
</html>
