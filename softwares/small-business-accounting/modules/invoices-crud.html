<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices</title>
    <link rel="stylesheet" href="../dashboard.css">
</head>
<body>
    <main class="main-content">
        <header>
            <h1>Invoices</h1>
            <button class="btn-primary" onclick="document.getElementById('addModal').style.display='block'">+ New Invoice</button>
        </header>
        <table class="crud-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Client</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Due Date</th>
                    <th>Attachment</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>INV-001</td>
                    <td>Acme Corp</td>
                    <td>$1,200.00</td>
                    <td><span class="status paid">Paid</span></td>
                    <td>2026-03-01</td>
                    <td><a href="#">View</a></td>
                    <td><button>Edit</button> <button>Delete</button></td>
                </tr>
                <tr>
                    <td>INV-002</td>
                    <td>Beta LLC</td>
                    <td>$1,100.00</td>
                    <td><span class="status overdue">Overdue</span></td>
                    <td>2026-02-15</td>
                    <td><a href="#">View</a></td>
                    <td><button>Edit</button> <button>Delete</button></td>
                </tr>
            </tbody>
        </table>
        <!-- Modal for adding invoice -->
        <div id="addModal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.2);z-index:100;align-items:center;justify-content:center;">
            <form style="background:#fff;padding:2rem;border-radius:1rem;max-width:400px;margin:5vh auto;" onsubmit="return false;">
                <h2>New Invoice</h2>
                <label>Client<br><input type="text" required></label><br>
                <label>Amount<br><input type="number" required></label><br>
                <label>Status<br>
                    <select>
                        <option>Pending</option>
                        <option>Paid</option>
                        <option>Overdue</option>
                    </select>
                </label><br>
                <label>Due Date<br><input type="date" required></label><br>
                <label>Attachment<br><input type="file"></label><br>
                <button class="btn-primary" type="submit">Save</button>
                <button type="button" onclick="document.getElementById('addModal').style.display='none'">Cancel</button>
            </form>
        </div>
    </main>
    <style>
        .crud-table { width:100%; border-collapse:collapse; margin-top:2rem; background:#fff; border-radius:1rem; overflow:hidden; }
        .crud-table th, .crud-table td { padding:0.8rem 1rem; border-bottom:1px solid #f3e8ff; text-align:left; }
        .crud-table th { background:#f3e8ff; color:#4c51bf; font-weight:700; }
        .crud-table tr:last-child td { border-bottom:none; }
        .status.paid { color:#059669; font-weight:700; }
        .status.overdue { color:#c2410c; font-weight:700; }
        .btn-primary { background:linear-gradient(to right,#7c3aed,#4c51bf);color:#fff;border:none;padding:0.6rem 1.2rem;border-radius:0.7rem;font-weight:700;cursor:pointer;margin-left:1rem; }
        .btn-primary:hover { opacity:0.9; }
    </style>
</body>
</html>
