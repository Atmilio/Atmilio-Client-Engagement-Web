<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Overview</title>
    <link rel="stylesheet" href="../dashboard.css">
</head>
<body>
    <main class="main-content">
        <header>
            <h1>User Management</h1>
            <button class="btn-primary" style="float:right;" onclick="alert('User invite coming soon!')">+ Invite User</button>
        </header>
        <section class="dashboard-widgets">
            <div class="widget"><h3>Users</h3><p>4</p></div>
            <div class="widget"><h3>Roles</h3><p>Admin, Accountant, Viewer</p></div>
        </section>
        <section>
            <h2 style="margin-top:2rem;">Team Members</h2>
            <table class="crud-table" style="margin-top:1rem;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Jane Doe</td>
                        <td>jane@atmilio.com</td>
                        <td>Admin</td>
                        <td><span class="status active">Active</span></td>
                        <td><button>Edit</button> <button>Disable</button></td>
                    </tr>
                    <tr>
                        <td>John Smith</td>
                        <td>john@atmilio.com</td>
                        <td>Accountant</td>
                        <td><span class="status invited">Invited</span></td>
                        <td><button>Resend Invite</button></td>
                    </tr>
                </tbody>
            </table>
        </section>
        <style>
            .status.active { color: #059669; font-weight: 700; }
            .status.invited { color: #4c51bf; font-weight: 700; }
        </style>
                </table>
            </main>
        </body>
