<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Ledger</title>
    <link rel="stylesheet" href="../dashboard.css">
</head>
<body>
    <nav class="sidebar">
        <h2>
            <svg class="atmilio-logo" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg" aria-labelledby="logoTitle" role="img">
                <title id="logoTitle">Atmilio Logo</title>
                <path d="M25 5L45 25L25 45L5 25L25 5Z" stroke="#4c51bf" stroke-width="2" stroke-linejoin="round" />
                <path d="M25 15L35 25L25 35L15 25L25 15Z" fill="#6b46c1" />
                <circle cx="25" cy="25" r="5" fill="#e9d5ff" />
            </svg>
            Atmilio Accounting
        </h2>
        <ul>
            <li><a href="../dashboard.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Dashboard</a></li>
            <li><a href="invoicing.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Invoicing</a></li>
            <li><a href="expenses.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Expenses</a></li>
            <li><a href="chart-of-accounts.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Chart of Accounts</a></li>
            <li><a href="journal-entries.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Journal Entries</a></li>
            <li class="active"><a href="general-ledger.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">General Ledger</a></li>
            <li><a href="reports.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Reports</a></li>
            <li><a href="banking.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Banking</a></li>
            <li><a href="#" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Payroll</a></li>
            <li><a href="users.html" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;">Settings</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header>
            <h1>General Ledger</h1>
            <label>Account:
                <select id="ledgerAccountSelect"></select>
            </label>
            <label>Date:
                <input type="date" id="ledgerFromDate"> to <input type="date" id="ledgerToDate">
            </label>
            <button onclick="renderLedger()">Filter</button>
        </header>
        <table class="crud-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Debit</th>
                    <th>Credit</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody id="ledgerTableBody">
                <!-- Populated by JS -->
            </tbody>
        </table>
    </main>
    <script src="accountingEngine.js"></script>
    <script>
      function renderLedger() {
        const accountId = parseInt(document.getElementById('ledgerAccountSelect').value);
        const fromDate = document.getElementById('ledgerFromDate').value || undefined;
        const toDate = document.getElementById('ledgerToDate').value || undefined;
        const ledger = window.accountingEngine.getLedger(accountId, { fromDate, toDate });
        const tbody = document.getElementById('ledgerTableBody');
        tbody.innerHTML = '';
        ledger.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.date}</td>
            <td>${row.description}</td>
            <td>${row.debit ? '$' + row.debit.toFixed(2) : ''}</td>
            <td>${row.credit ? '$' + row.credit.toFixed(2) : ''}</td>
            <td>${row.balance ? '$' + row.balance.toFixed(2) : '$0.00'}</td>
          `;
          tbody.appendChild(tr);
        });
      }
      function populateAccountSelect() {
        const select = document.getElementById('ledgerAccountSelect');
        select.innerHTML = '';
        window.accountingEngine.accounts.forEach(acc => {
          const opt = document.createElement('option');
          opt.value = acc.id;
          opt.textContent = acc.name + ' (' + acc.type.charAt(0).toUpperCase() + acc.type.slice(1) + ')';
          select.appendChild(opt);
        });
      }
      populateAccountSelect();
      renderLedger();
    </script>
</body>
</html>
